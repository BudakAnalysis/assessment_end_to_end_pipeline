# bundle.yaml - TVMaze data pipeline (Databricks Asset Bundles)
# Samed Budak

bundle:
  name: tvmaze-data-pipeline
  default_target: dev

workspace:
  host: ${var.databricks_host}

include:
  - ./configs/${bundle.target}.yaml

sync:
  include:
    - notebooks/**
    - tests/**
    - sql/**

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  jobs:
    tvmaze-pipeline-job:
      name: "TVMaze_E2E_Pipeline_${bundle.target}"
      description: "Bronze -> Silver -> Gold pipeline for TVMaze data"

      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "Europe/Amsterdam"
        pause_status: "${var.schedule_pause_status}"

      email_notifications:
        on_failure:
          - "samed.budak@gmail.com"

      max_concurrent_runs: 1

      tasks:
        - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ./notebooks/01_bronze_ingestion
            base_parameters:
              catalog: "${var.catalog_name}"
              schema: "bronze"
              environment: "${bundle.target}"
              max_shows: "${var.max_shows}"
          job_cluster_key: pipeline_cluster
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 60000

        - task_key: silver_transformations
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ./notebooks/02_silver_transformations
            base_parameters:
              catalog: "${var.catalog_name}"
              environment: "${bundle.target}"
          job_cluster_key: pipeline_cluster
          timeout_seconds: 3600
          max_retries: 1

        - task_key: gold_aggregations
          depends_on:
            - task_key: silver_transformations
          notebook_task:
            notebook_path: ./notebooks/03_gold_aggregations
            base_parameters:
              catalog: "${var.catalog_name}"
              environment: "${bundle.target}"
          job_cluster_key: pipeline_cluster
          timeout_seconds: 1800
          max_retries: 1

        # DQ checks run as pytest in CI/CD (azure-pipelines.yml).
        # In production, wire up a DQ notebook (e.g. Great Expectations or custom checks)
        # at ./notebooks/04_data_quality and reference it here.
        - task_key: data_quality_checks
          depends_on:
            - task_key: gold_aggregations
          notebook_task:
            notebook_path: ./notebooks/data_quality_checks
            base_parameters:
              catalog: "${var.catalog_name}"
              environment: "${bundle.target}"
          job_cluster_key: pipeline_cluster
          timeout_seconds: 900

      job_clusters:
        - job_cluster_key: pipeline_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "${var.node_type_id}"
            num_workers: ${var.num_workers}
            spark_conf:
              "spark.databricks.delta.optimizeWrite.enabled": "true"
              "spark.databricks.delta.autoCompact.enabled": "true"
              "spark.sql.shuffle.partitions": "auto"
            spark_env_vars:
              ENVIRONMENT: "${bundle.target}"
              CATALOG_NAME: "${var.catalog_name}"
            autoscale:
              min_workers: ${var.min_workers}
              max_workers: ${var.max_workers}
            custom_tags:
              project: "tvmaze-pipeline"
              environment: "${bundle.target}"

      permissions:
        - group_name: "data-engineers"
          permission_level: "CAN_MANAGE"
        - group_name: "data-analysts"
          permission_level: "CAN_VIEW"

      tags:
        project: "tvmaze"
        pipeline_type: "batch"

# ---------------------------------------------------------------------------
# Variables (defaults, overridden per target config)
# ---------------------------------------------------------------------------
variables:
  databricks_host:
    default: "https://adb-dev.azuredatabricks.net"
  catalog_name:
    default: "tvmaze_catalog_dev"
  node_type_id:
    default: "Standard_DS3_v2"
  num_workers:
    default: "2"
  min_workers:
    default: 1
  max_workers:
    default: 4
  max_shows:
    default: "50"
  schedule_pause_status:
    default: "PAUSED"

# ---------------------------------------------------------------------------
# Targets
# ---------------------------------------------------------------------------
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${var.databricks_host}

  acc:
    mode: production
    workspace:
      host: ${var.databricks_host}

  prod:
    mode: production
    workspace:
      host: ${var.databricks_host}
